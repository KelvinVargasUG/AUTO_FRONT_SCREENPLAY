serenity {
  take.screenshots = AFTER_EACH_STEP
  reports.show.step.details = false
}

webdriver {
  driver = chrome
  autodownload = true
  timeouts {
    implicitlywait = 5000
    pageLoadTimeout = 30000
  }
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--start-maximized", "--disable-notifications"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "http://localhost:5173"
  }
  dev {
    webdriver.base.url = "http://localhost:5173"
  }
}

